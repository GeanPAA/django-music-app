<!DOCTYPE html>
<html>
<head>
    <title>Artistas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-4">

    <h1 class="text-center mb-4">🎤 Lista de Artistas</h1>

    <div class="text-center mb-4">
        <a href="/songs/" class="btn btn-primary">Canciones</a>
        <a href="/artists/" class="btn btn-success">Artistas</a>
    </div>

    {% for artist in artists %}
    <div class="card bg-secondary text-white mb-3 shadow">
        <div class="card-body">
            <h5 class="card-title">{{ artist.name }}</h5>
            <p class="card-text"><strong>Nacionalidad:</strong> {{ artist.nationality }}</p>
        </div>
    </div>
    {% empty %}
    <p class="text-center">No hay artistas registrados.</p>
    {% endfor %}

</div>

</body>
</html>
